<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Nuova Partita</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/nuova-partita.css">
</head>
<body class="body_nuova_partita">
  <header>
    <a href="home.html"><img src="img/utils/logo.jpg" alt="Logo"></a>
  </header>

  <div class="container">
    <h1>Giocatori in campo</h1>
    <div class="controls">
      <button onclick="modificaGiocatori(-1)">−</button>
      <span class="counter" id="numeroGiocatori">2</span>
      <button onclick="modificaGiocatori(1)">+</button>
    </div>
    <button class="start-btn" onclick="iniziaPartita()">INIZIA</button>
  </div>

  <script src="js/pages/nuova_partita.js" defer></script>
</body>
</html>
